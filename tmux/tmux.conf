# -----------------------------------------------------------------------------
# This config is targeted for tmux 3.1+.
#
# Read the "Plugin Manager" section (bottom) before trying to use this config!
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Global options
# -----------------------------------------------------------------------------

# change the prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g default-command "${SHELL}"

# Enable true color (24-bit) support
set -ga terminal-overrides ",xterm-256color:Tc"

# Send xterm compatible control arrow keys so they work with Vim.
setw -g xterm-keys on

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (avoids gaps like 1, 3, 4)
set -g renumber-windows on

# Automatically rename windows based on the running command
setw -g automatic-rename on

# Enable full mouse support.
set -g mouse on


# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Unbind default keys.
unbind '"'
unbind %

# Reload the tmux config.
bind r source-file "$TMUX_CONFIG/tmux.conf" \; display "Config reloaded!"

# Switch windows without prefix using Alt+arrow
bind -n M-Left previous-window
bind -n M-Right next-window

# split panes using | and -, make sure they open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch panes without prefix using Alt+j/k/i/l
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-i select-pane -U
bind -n M-l select-pane -R


# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Various colors and styles.
run "$DOTFILES/tmux/set_theme.sh"

# Customize where resurrect save files are stored.
set -g @resurrect-dir "$TMUX_CONFIG/resurrect"

# Avoid using clip.exe in WSL 2 by using our own clipboard copying script.
# This fixes certain UTF-8 encoded chars like emojis or `tree`'s pipes from
# being garbled. See: https://github.com/tmux-plugins/tmux-yank/issues/188
set -g @override_copy_command 'pbcopy'

# Prevent yank from scrolling to the bottom of your buffer after copying.
set -g @yank_action 'pbpaste'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# To install: PREFIX+SHIFT+I
run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
